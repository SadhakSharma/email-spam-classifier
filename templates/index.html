<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Spam Detector - AI Powered</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --dark: #2c3e50;
            --light: #f8f9fa;
            --success: #51cf66;
            --danger: #ff6b6b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 700px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #ff8787 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
            font-weight: 300;
        }

        .main {
            padding: 40px;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--dark);
            font-size: 1.05em;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1em;
            resize: vertical;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #ff8787 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 107, 107, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: var(--dark);
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .result {
            display: none;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result.spam {
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid var(--danger);
        }

        .result.legitimate {
            background: rgba(81, 207, 102, 0.1);
            border: 2px solid var(--success);
        }

        .result-icon {
            font-size: 2.5em;
            margin-bottom: 12px;
        }

        .result-label {
            font-size: 1.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .result.spam .result-label {
            color: var(--danger);
        }

        .result.legitimate .result-label {
            color: var(--success);
        }

        .confidence-bar {
            margin-top: 15px;
            margin-bottom: 10px;
        }

        .bar-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .result.spam .bar-fill {
            background: linear-gradient(90deg, var(--danger), #ff8787);
        }

        .result.legitimate .bar-fill {
            background: linear-gradient(90deg, var(--success), #69db7c);
        }

        .details {
            margin-top: 15px;
            font-size: 0.95em;
            color: #555;
            line-height: 1.6;
        }

        .details p {
            margin-bottom: 8px;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 107, 107, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            display: none;
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid var(--danger);
            color: var(--danger);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .features {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }

        .features h3 {
            color: var(--dark);
            margin-bottom: 12px;
            font-size: 1.1em;
        }

        .feature-list {
            list-style: none;
            font-size: 0.95em;
            color: #555;
        }

        .feature-list li {
            padding: 6px 0;
            padding-left: 24px;
            position: relative;
        }

        .feature-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--secondary);
            font-weight: bold;
            font-size: 1.1em;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8em;
            }

            .main {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Spam Detector</h1>
            <p>AI-powered email classification using Machine Learning</p>
        </div>

        <div class="main">
            <div class="error" id="error"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Analyzing email...</p>
            </div>

            <div class="input-section">
                <label class="label" for="emailInput">Paste your email text here:</label>
                <textarea id="emailInput" placeholder="Enter the email content you want to check..."></textarea>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="analyzeEmail()">Analyze Email</button>
                <button class="btn-secondary" onclick="clearForm()">Clear</button>
            </div>

            <div class="result" id="result"></div>

            <div class="features">
                <h3>🤖 How It Works</h3>
                <ul class="feature-list">
                    <li>Uses TF-IDF feature extraction for text analysis</li>
                    <li>Trained on thousands of email samples</li>
                    <li>Naive Bayes classifier with 94%+ accuracy</li>
                    <li>Real-time predictions with confidence scores</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        async function analyzeEmail() {
            const emailText = document.getElementById('emailInput').value.trim();
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');

            // Validation
            errorDiv.style.display = 'none';
            resultDiv.style.display = 'none';

            if (!emailText) {
                errorDiv.textContent = '⚠️ Please enter some email text to analyze';
                errorDiv.style.display = 'block';
                return;
            }

            // Show loading
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email: emailText })
                });

                if (!response.ok) {
                    throw new Error('Server error. Make sure the model is trained.');
                }

                const data = await response.json();
                displayResult(data);

            } catch (error) {
                errorDiv.textContent = '❌ Error: ' + error.message;
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
            }
        }

        function displayResult(data) {
            const resultDiv = document.getElementById('result');
            const isSpam = data.is_spam;

            const spamColor = Math.round(data.spam_probability);
            const legitimateColor = Math.round(data.legitimate_probability);

            resultDiv.className = `result ${isSpam ? 'spam' : 'legitimate'}`;
            resultDiv.innerHTML = `
                <div class="result-icon">${isSpam ? '🚨' : '✅'}</div>
                <div class="result-label">${data.label}</div>
                <p style="color: #666; margin-bottom: 15px;">Confidence: ${Math.round(data.confidence)}%</p>

                <div class="confidence-bar">
                    <div class="bar-label">
                        <span>Spam Probability</span>
                        <span>${spamColor}%</span>
                    </div>
                    <div class="bar">
                        <div class="bar-fill" style="width: ${spamColor}%"></div>
                    </div>
                </div>

                <div class="confidence-bar">
                    <div class="bar-label">
                        <span>Legitimate Probability</span>
                        <span>${legitimateColor}%</span>
                    </div>
                    <div class="bar">
                        <div class="bar-fill" style="width: ${legitimateColor}%"></div>
                    </div>
                </div>

                <div class="details">
                    <p><strong>${isSpam ? '⚠️ Warning:' : '✨ Verdict:'}</strong> 
                    ${isSpam 
                        ? 'This email shows characteristics of spam. Be cautious with links and attachments.' 
                        : 'This email appears to be legitimate. No spam indicators detected.'
                    }</p>
                </div>
            `;
            resultDiv.style.display = 'block';
        }

        function clearForm() {
            document.getElementById('emailInput').value = '';
            document.getElementById('result').style.display = 'none';
            document.getElementById('emailInput').focus();
        }

        // Enter key support
        document.getElementById('emailInput').addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.key === 'Enter') {
                analyzeEmail();
            }
        });
    </script>
</body>
</html>
